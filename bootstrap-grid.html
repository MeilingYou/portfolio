<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap Grid Practice</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="bg-dark text-white py-4">
      <div class="container">
        <h1 class="h3 mb-1">Bootstrap Grid Practice</h1>
        <p class="mb-0">CISC 3610 • Meiling You</p>
      </div>
    </header>

    <main class="container py-5">
      <!-- Row 1: 2 equal columns on md+ -->
      <h2 class="h5 mb-3">Row 1: Two columns</h2>
      <div class="row g-3 mb-4">
        <div class="col-12 col-md-6">
          <div class="p-3 border rounded">Column A (col-12 col-md-6)</div>
        </div>
        <div class="col-12 col-md-6">
          <div class="p-3 border rounded">Column B (col-12 col-md-6)</div>
        </div>
      </div>

      <!-- Row 2: 3 columns on lg, 2 columns on md, 1 column on mobile -->
      <h2 class="h5 mb-3">Row 2: Three cards</h2>
      <div class="row g-3 mb-4">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded">Card 1</div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded">Card 2</div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded">Card 3</div>
        </div>
      </div>

      <!-- Row 3: 8/4 split on md+ -->
      <h2 class="h5 mb-3">Row 3: 8 / 4 split</h2>
      <div class="row g-3">
        <div class="col-12 col-md-8">
          <div class="p-3 border rounded">Main content (col-md-8)</div>
        </div>
        <div class="col-12 col-md-4">
          <div class="p-3 border rounded">Sidebar (col-md-4)</div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS bundle (optional for grid, but fine to include) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
