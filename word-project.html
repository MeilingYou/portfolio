<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Words Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>

  <body>
    <div class="container py-4">
      <h1 class="h3 mb-4">Multimedia Dictionary (Words Project)</h1>

      <!--word selection: dropdown + speak word button -->
      <div class="row g-2 align-item-center mb-3">
        <div class="col">
          <select class="form-select" id="wordSelect" onchange="onWordChange()">
            <option value=" ">-- Select --</option>

            <option value="Apple" data-sentence="An apple a day, keeps a doctor away.">Apple</option>
            <option value="Laughter" data-sentence="Laughter is the best medicine.">Laughter</option>
            <option value="Cat" data-sentence="Curiosity killed the cat, but satisfaction brought it back.">Cat
            </option>
            <option value="Bird" data-sentence="The early bird catches the worm.">Bird</option>
            <option value="Lemon" data-sentence="When life gives you lemons, make lemonade.">Lemon</option>

             </select>
        </div>

        <div class="col-auto">
          <button class="btn btn-primary" onclick="speakWord()">Speak Word</button>
        </div>
      </div>

      <!-- Sentence Display: textarea + Speak Sentence button -->
      <div class="row g-2 align-items-start">
        <div class="col">
          <textarea class="form-control" id="sentenceBox" rows="3" readonly></textarea>
        </div>

        <div class="col-auto">
          <button class="btn btn-success" onclick="speakSentence()">Speak Sentence</button>
        </div>
      </div>
    </div>

    <script src="words-project.js"></script>
  </body>
</html>
